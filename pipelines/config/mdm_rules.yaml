# ─────────────────────────────────────────────────────────────────
# ROLE: Từ điển Nghiệp vụ (Business Rules)
# FILE: mdm_rules.yaml
# DESCRIPTION: Tách biệt logic kinh doanh, định nghĩa các bản đồ 
#              gộp từ vựng và thuật toán entity resolution.
# ─────────────────────────────────────────────────────────────────

mdm:
  # 1. Entity Resolution (Đồng nhất thực thể - Gộp nhà trùng lặp)
  entity_resolution:
    # Ngưỡng độ tin cậy để AI/Thuật toán gộp 2 tin đăng làm 1 (Ví dụ: giống nhau 85%)
    fuzzy_match_threshold: 0.85
    # Các cột dùng để so khớp mức độ trùng lặp
    match_columns: ["title", "price", "area_sqm", "district"]

  # 2. Reference Data (Quản lý Danh mục chuẩn - Master Data)
  # Map các từ ngữ địa phương/khác nhau về 1 chuẩn duy nhất của hệ thống
  city_mapping:
    "Hồ Chí Minh": ["HCM", "Sài Gòn", "TP.HCM", "SG", "Thành phố Hồ Chí Minh", "Tp Hồ Chí Minh"]
    "Hà Nội": ["HN", "Thủ Đô", "TP.HN", "Hanoi", "Tp Hà Nội"]
    "Long An": ["LA", "Long An"]

  district_mapping:
    # --- Hồ Chí Minh ---
    "Quận 1": ["Q1", "Q.1", "Quận Nhất", "Quận 1"]
    "Quận 2": ["Q2", "Q.2", "Quận Hai", "Quận 2", "Thành phố Thủ Đức"]
    "Quận 3": ["Q3", "Q.3", "Quận Ba", "Quận 3"]
    "Quận 4": ["Q4", "Q.4", "Quận Tư", "Quận 4"]
    "Quận 5": ["Q5", "Q.5", "Quận Năm", "Quận 5"]
    "Quận 6": ["Q6", "Q.6", "Quận Sáu", "Quận 6"]
    "Quận 7": ["Q7", "Q.7", "Quận Bảy", "Quận 7"]
    "Quận 8": ["Q8", "Q.8", "Quận Tám", "Quận 8"]
    "Quận 9": ["Q9", "Q.9", "Quận Chín", "Quận 9"]
    "Quận 10": ["Q10", "Q.10", "Quận Mười", "Quận 10"]
    "Quận 11": ["Q11", "Q.11", "Quận Mười Một", "Quận 11"]
    "Quận 12": ["Q12", "Q.12", "Quận Mười Hai", "Quận 12"]
    "Thủ Đức": ["Thủ Đức"]
    "Quận Bình Thạnh": ["Bình Thạnh", "Quận Bình Thạnh"]
    "Quận Bình Tân": ["Bình Tân", "Quận Bình Tân"]
    "Quận Tân Phú": ["Tân Phú", "Quận Tân Phú"]
    "Quận Tân Bình": ["Tân Bình", "Quận Tân Bình"]
    "Quận Gò Vấp": ["Gò Vấp", "Quận Gò Vấp"]
    "Quận Phú Nhuận": ["Phú Nhuận", "Quận Phú Nhuận"]
    "Huyện Hóc Môn": ["Hóc Môn", "Huyện Hóc Môn"]

    # --- Hà Nội ---
    "Quận Cầu Giấy": ["Cầu Giấy", "Quận Cầu Giấy"]
    "Quận Hoàng Mai": ["Hoàng Mai", "Quận Hoàng Mai"]
    "Quận Đống Đa": ["Đống Đa", "Quận Đống Đa"]
    "Quận Bắc Từ Liêm": ["Bắc Từ Liêm", "Quận Bắc Từ Liêm"]

    # --- Long An ---
    "Huyện Đức Hòa": ["Huyện Đức Hòa", "Đức Hòa"]

  # Từ điển các loại hình BĐS gộp từ vựng 
  property_type_mapping:
    "Căn hộ chung cư": ["Chung cư", "Căn hộ", "Condotel", "Apartment", "CHCC", "Penthouse"]
    "Nhà phố/Nhà riêng": ["Nhà phố", "Nhà hẻm", "Nhà riêng", "Nhà liền kề", "Nhà nguyên căn", "Nhà ở"]
    "Biệt thự/Villa": ["Biệt thự", "Villa"]
    "Phòng trọ/Nhà trọ": ["Phòng trọ", "Nhà trọ", "Phòng gác lửng", "Ký túc xá", "Sleepbox"]
    "Đất nền/Đất dự án": ["Đất nền", "Đất dự án", "Đất thổ cư", "Đất nông nghiệp", "Đất"]
    "Văn phòng/Mặt bằng": ["Văn phòng", "Mặt bằng kinh doanh", "Mặt bằng", "Shop house", "Shophouse"]

  # 3. Nơi lưu trữ các bảng Danh mục chuẩn (Reference Tables) ở tầng Silver
  reference_data_path: "lakehouse/master_data/"  # Bị comment để không ghi bảng danh mục vào lakehouse, tương lai phát triển thêm FILE.CSV chuẩn của tổng cục địa chính để so sánh và chuẩn hoá dữ liệu 
  
