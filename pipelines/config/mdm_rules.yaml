# ─────────────────────────────────────────────────────────────────
# ROLE: Từ điển Nghiệp vụ (Business Rules)
# FILE: mdm_rules.yaml
# DESCRIPTION: Tách biệt logic kinh doanh, định nghĩa các bản đồ 
