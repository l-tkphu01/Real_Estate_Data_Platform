runtime:
  dagster_home: /opt/dagster/dagster_home

storage:
  # Cấu hình kết nối Azurite tại localhost dành cho môi trường dev khi scaling
  azure_endpoint: http://127.0.0.1:10000/devstoreaccount1
  azure_storage_account: devstoreaccount1
  azure_storage_key: ""  # Được ghi đè bởi cấu hình trong .env (tính bảo mật)

ingestion:
  # Cấu hình scaling cực lớn cho Multi-category (3000 records tổng cộng = 1000 records/danh mục)
  max_pages: 150              # Tổng số trang (50 trang x 3 danh mục)
  pages_per_batch: 5          # Cào 5 trang cùng lúc, rồi delay 2s trước batch tiếp
  batch_delay_seconds: 2.0    # Delay 2s giữa các batch để tránh bị chặn IP
  semaphore_size: 3           # Giới hạn 3 request đồng thời
  categories: [1000, 1001, 1002] # Multi-category: BĐS (1000) + Xe cộ (1001) + Điện thoại (1002)
  pages_per_category: 50      # Lấy dầy đủ 50 trang (1000 records) cho MỖI THEO DANH MỤC
  # request_timeout_seconds: 60  # Optional: tăng timeout từ 30s → 60s nếu cần

# ─────────────────────────────────────────────────────────────────
# Step 2 & 3 Scaling Summary:
# ─────────────────────────────────────────────────────────────────
# 1. Spark Memory: 1GB → 2GB (resources.py)
#    - Driver memory: 2g (từ 1g)
#    - Executor memory: 2g (từ 1g)
#    → Xử lý 1000 records + Silver dedup + Gold transform không OOM
#
# 2. Dagster Timeouts: 30s → 300s (jobs.py)
#    - ingestion_job: 300s (từ implicit 30s)
#    - processing_job: 300s (từ implicit 30s)
#    → Đủ thời gian cho batching (50s) + Spark processing (200s) + buffer
#
# Usage:
#   APP_PROFILE=local.scale python -m dagster dev
#   → Timeline: ~50s batching + ~2s delays + ~100s Spark + buffer = ~300s OK
# ─────────────────────────────────────────────────────────────────
