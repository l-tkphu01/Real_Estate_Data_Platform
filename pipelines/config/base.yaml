runtime: # Chạy trên môi trường Azure, sử dụng Azure Storage để lưu trữ dữ liệu và cấu hình chung cho dự án
  project_name: real-estate-data-platform
  dagster_home: /opt/dagster/dagster_home
  superset_secret_key: "" # MUST BE PROVIDED BY .ENV

logging: # Cấu hình logging chung cho tất cả các môi trường, có thể được override trong các profile cụ thể  
  level: INFO
  fmt: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"

storage:
  azure_container: real-estate-platform # Tên container Azure Storage dùng chung cho tất cả các môi trường
  azure_storage_account: devstoreaccount1 # Tên tài khoản Azure Storage dùng cho Dev, cần được override trong profile Azure thực tế
  azure_storage_key: "" # MUST BE PROVIDED BY .ENV
  azure_endpoint: null
  raw_prefix: raw/real_estate
  bronze_prefix: bronze/real_estate 
  silver_prefix: silver/real_estate
  gold_prefix: gold/real_estate
  cdc_state_prefix: state/cdc # Prefix lưu trạng thái CDC, có thể được override nếu cần thiết

ingestion:
  data_source_url: https://example.com/api/properties
  request_timeout_seconds: 30
  ingestion_max_retries: 3
  ingestion_backoff_seconds: 2
  max_pages: 10
  pages_per_batch: 5
  batch_delay_seconds: 2.0
  semaphore_size: 3
  categories: [1000]  # Default: chỉ cào bất động sán (1000)
  pages_per_category: 10  # Số trang/category
