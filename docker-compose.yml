version: "3.9"

services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: real-estate-azurite
    command: "azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0"
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite_data:/data

  dagster-webserver:
    build:
      context: .
      dockerfile: docker/dagster/Dockerfile
    container_name: real-estate-dagster-web
    env_file:
      - .env
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
    volumes:
      - ./:/opt/dagster/app
      - dagster_home:/opt/dagster/dagster_home
    working_dir: /opt/dagster/app
    command: dagster-webserver -h 0.0.0.0 -p 3000 -w workspace.yaml
    ports:
      - "3000:3000"
    depends_on:
      azurite:
        condition: service_started

  dagster-daemon:
    build:
      context: .
      dockerfile: docker/dagster/Dockerfile
    container_name: real-estate-dagster-daemon
    env_file:
      - .env
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
    volumes:
      - ./:/opt/dagster/app
      - dagster_home:/opt/dagster/dagster_home
    working_dir: /opt/dagster/app
    command: dagster-daemon run -w workspace.yaml
    depends_on:
      azurite:
        condition: service_started

  superset:
    build:
      context: .
      dockerfile: docker/superset/Dockerfile
    container_name: real-estate-superset
    env_file:
      - .env
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      PYTHONPATH: /app/pythonpath
    volumes:
      - ./docker/superset:/app/pythonpath
      - superset_home:/app/superset_home
      - ./data:/app/data
    ports:
      - "8088:8088"
    command: >
      /bin/sh -c "
      superset db upgrade &&
      superset fab create-admin --username admin --firstname Admin --lastname User --email admin@example.com --password admin || true &&
      superset init &&
      gunicorn --workers 1 --threads 1 --timeout 120 -b 0.0.0.0:8088 'superset.app:create_app()'
      "
    depends_on:
      azurite:
        condition: service_started

volumes:
  azurite_data:
  dagster_home:
  superset_home:
