version: "3.9"

services:
  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    container_name: real-estate-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  dagster-webserver:
    build:
      context: .
      dockerfile: docker/dagster/Dockerfile
    container_name: real-estate-dagster-web
    env_file:
      - .env
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
    volumes:
      - ./:/opt/dagster/app
      - dagster_home:/opt/dagster/dagster_home
    working_dir: /opt/dagster/app
    command: dagster-webserver -h 0.0.0.0 -p 3000 -w workspace.yaml
    ports:
      - "3000:3000"
    depends_on:
      minio:
        condition: service_healthy

  dagster-daemon:
    build:
      context: .
      dockerfile: docker/dagster/Dockerfile
    container_name: real-estate-dagster-daemon
    env_file:
      - .env
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
    volumes:
      - ./:/opt/dagster/app
      - dagster_home:/opt/dagster/dagster_home
    working_dir: /opt/dagster/app
    command: dagster-daemon run -w workspace.yaml
    depends_on:
      minio:
        condition: service_healthy

  superset:
    image: apache/superset:4.1.1
    container_name: real-estate-superset
    env_file:
      - .env
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      PYTHONPATH: /app/pythonpath
    volumes:
      - ./docker/superset:/app/pythonpath
      - superset_home:/app/superset_home
    ports:
      - "8088:8088"
    command: >
      /bin/sh -c "
      superset db upgrade &&
      superset fab create-admin --username admin --firstname Admin --lastname User --email admin@example.com --password admin || true &&
      superset init &&
      superset run -h 0.0.0.0 -p 8088
      "
    depends_on:
      minio:
        condition: service_healthy

volumes:
  minio_data:
  dagster_home:
  superset_home:
